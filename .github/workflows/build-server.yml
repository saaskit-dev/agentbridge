name: Build & Push Server

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-server.yml'
      - 'apps/free/server/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/free-server-build.sh'
      - 'scripts/free-server-deploy.sh'
      - 'turbo.json'
  workflow_dispatch:

concurrency:
  group: build-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Server Changes
    runs-on: ${{ fromJSON(vars.MACOS_RUNNER_LABELS_JSON || vars.IOS_RUNNER_LABELS_JSON || '["self-hosted","macOS","ARM64","local-mac"]') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/quality-gate

  build:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        working-directory: packages/core
        run: pnpm build

      - name: Build bundle & generate prisma
        working-directory: apps/free/server
        run: |
          pnpm build:bundle
          pnpm db:generate

      - name: Copy pglite wasm files
        working-directory: apps/free/server
        run: |
          PGLITE_DIR=$(find "$GITHUB_WORKSPACE/node_modules/.pnpm" -path "*pglite/dist" -type d | head -1)
          if [ -z "$PGLITE_DIR" ]; then
            echo "ERROR: Could not find pglite dist directory"
            exit 1
          fi
          cp "$PGLITE_DIR/pglite.wasm" dist/
          cp "$PGLITE_DIR/pglite.data" dist/

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@v7
        with:
          context: apps/free/server
          platforms: linux/amd64
          push: true
          tags: kilingzhang/free-server:latest
          build-args: |
            BUILD_TIME=${{ github.event.repository.updated_at }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          EXPO_UPDATES_ADMIN_TOKEN: ${{ secrets.OTA_SERVER_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_SSH_PORT || 27547 }}
          envs: EXPO_UPDATES_ADMIN_TOKEN
          script: |
            set -euo pipefail
            cd "${{ vars.SERVER_DEPLOY_DIR || '/root/free-server' }}"
            touch .env

            upsert_env() {
              local key="$1"
              local value="$2"
              local file=".env"
              local tmp_file
              tmp_file="$(mktemp)"

              awk -v key="$key" -v value="$value" '
                BEGIN { updated = 0 }
                index($0, key "=") == 1 {
                  if (updated == 0) {
                    print key "=" value
                    updated = 1
                  }
                  next
                }
                { print }
                END {
                  if (updated == 0) {
                    print key "=" value
                  }
                }
              ' "$file" > "$tmp_file"

              mv "$tmp_file" "$file"
            }

            upsert_env EXPO_UPDATES_GATEWAY_ENABLED true
            upsert_env EXPO_UPDATES_GATEWAY_MODE self-hosted
            upsert_env EXPO_UPDATES_ADMIN_TOKEN "$EXPO_UPDATES_ADMIN_TOKEN"

            ./deploy.sh
