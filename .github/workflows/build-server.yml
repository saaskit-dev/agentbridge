name: Build & Push Server

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Lint & Dependency Guard"]
    types: [completed]
    branches: [main]

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.head_sha) || github.sha }}
          fetch-depth: 2

      - name: Detect relevant changes
        id: changes
        run: |
          set -e
          SHOULD_BUILD=true
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            CHANGED="$(git diff --name-only HEAD^..HEAD | rg -n '^(apps/free/server/|packages/core/)' || true)"
            if [ -z "$CHANGED" ]; then
              SHOULD_BUILD=false
            fi
          fi
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.should_build == 'true'
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.should_build == 'true'

      - name: Install dependencies
        if: steps.changes.outputs.should_build == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build core package
        if: steps.changes.outputs.should_build == 'true'
        working-directory: packages/core
        run: pnpm build

      - name: Build bundle & generate prisma
        if: steps.changes.outputs.should_build == 'true'
        working-directory: apps/free/server
        run: |
          pnpm build:bundle
          pnpm db:generate

      - name: Copy pglite wasm files
        if: steps.changes.outputs.should_build == 'true'
        working-directory: apps/free/server
        run: |
          PGLITE_DIR=$(find "$GITHUB_WORKSPACE/node_modules/.pnpm" -path "*pglite/dist" -type d | head -1)
          if [ -z "$PGLITE_DIR" ]; then
            echo "ERROR: Could not find pglite dist directory"
            exit 1
          fi
          cp "$PGLITE_DIR/pglite.wasm" dist/
          cp "$PGLITE_DIR/pglite.data" dist/

      - uses: docker/setup-buildx-action@v3
        if: steps.changes.outputs.should_build == 'true'

      - uses: docker/login-action@v3
        if: steps.changes.outputs.should_build == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push (linux/amd64)
        if: steps.changes.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: apps/free/server
          platforms: linux/amd64
          push: true
          tags: kilingzhang/free-server:latest
          build-args: |
            BUILD_TIME=${{ github.event.repository.updated_at }}

      - name: Deploy to VPS
        if: steps.changes.outputs.should_build == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 27547
          script: |
            cd /root/free-server
            ./deploy.sh
