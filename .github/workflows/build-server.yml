name: Build & Push Server

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/free/server/**'
      - 'packages/core/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        working-directory: packages/core
        run: pnpm build

      - name: Build bundle & generate prisma
        working-directory: apps/free/server
        run: |
          pnpm build:bundle
          pnpm db:generate

      - name: Copy pglite wasm files
        working-directory: apps/free/server
        run: |
          PGLITE_DIR=$(find "$GITHUB_WORKSPACE/node_modules/.pnpm" -path "*pglite/dist" -type d | head -1)
          if [ -z "$PGLITE_DIR" ]; then
            echo "ERROR: Could not find pglite dist directory"
            exit 1
          fi
          cp "$PGLITE_DIR/pglite.wasm" dist/
          cp "$PGLITE_DIR/pglite.data" dist/

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: apps/free/server
          platforms: linux/amd64
          push: true
          tags: kilingzhang/free-server:latest
          build-args: |
            BUILD_TIME=${{ github.event.repository.updated_at }}
