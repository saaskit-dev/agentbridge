name: Typecheck (core + CLI)

# Manual only — not on push/PR until the team turns it on.
on:
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (@saaskit-dev/agentbridge + @saaskit-dev/free)
        run: pnpm typecheck
