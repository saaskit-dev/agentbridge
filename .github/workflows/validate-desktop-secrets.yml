name: Validate Desktop Secrets

on:
  workflow_dispatch:

jobs:
  validate:
    name: Validate Tauri updater secrets
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Validate updater public key format
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          node <<'EOF'
          const input = process.env.TAURI_UPDATER_PUBLIC_KEY;
          if (!input || !input.trim()) {
            throw new Error('Missing TAURI_UPDATER_PUBLIC_KEY');
          }

          const trimmed = input.trim();
          let text = trimmed;
          try {
            const decoded = Buffer.from(trimmed, 'base64').toString('utf8');
            if (decoded.includes('untrusted comment:')) {
              text = decoded;
            }
          } catch {}

          if (!text.includes('untrusted comment:') || !/public key/i.test(text)) {
            throw new Error('TAURI_UPDATER_PUBLIC_KEY is not valid minisign public key content');
          }

          console.log('TAURI_UPDATER_PUBLIC_KEY format looks valid');
          EOF
          node <<'EOF' > /tmp/tauri-updater-public-key.pub
          const input = process.env.TAURI_UPDATER_PUBLIC_KEY;
          const trimmed = input.trim();
          let text = trimmed;
          try {
            const decoded = Buffer.from(trimmed, 'base64').toString('utf8');
            if (decoded.includes('untrusted comment:')) {
              text = decoded;
            }
          } catch {}
          process.stdout.write(text.endsWith('\n') ? text : `${text}\n`);
          EOF

      - name: Validate signing private key format
        env:
          TAURI_SIGNING_PRIVATE_KEY_RAW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          node <<'EOF'
          const input = process.env.TAURI_SIGNING_PRIVATE_KEY_RAW;
          if (!input || !input.trim()) {
            throw new Error('Missing TAURI_SIGNING_PRIVATE_KEY');
          }

          const trimmed = input.trim();
          let text = trimmed;
          try {
            const decoded = Buffer.from(trimmed, 'base64').toString('utf8');
            if (decoded.includes('untrusted comment:')) {
              text = decoded;
            }
          } catch {}

          if (!text.includes('untrusted comment:') || !/secret key/i.test(text)) {
            throw new Error('TAURI_SIGNING_PRIVATE_KEY is not valid minisign private key content');
          }

          console.log('TAURI_SIGNING_PRIVATE_KEY format looks valid');
          EOF

      - name: Validate signing password and signing flow
        env:
          TAURI_SIGNING_PRIVATE_KEY_RAW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          node <<'EOF' > /tmp/tauri-signing-key.txt
          const input = process.env.TAURI_SIGNING_PRIVATE_KEY_RAW;
          const trimmed = input.trim();
          let text = trimmed;
          try {
            const decoded = Buffer.from(trimmed, 'base64').toString('utf8');
            if (decoded.includes('untrusted comment:')) {
              text = decoded;
            }
          } catch {}
          process.stdout.write(text.endsWith('\n') ? text : `${text}\n`);
          EOF
          printf 'desktop secret validation\n' > /tmp/desktop-secret-validation.txt
          cd apps/free/app
          TAURI_PRIVATE_KEY_PATH=/tmp/tauri-signing-key.txt \
          TAURI_PRIVATE_KEY_PASSWORD="$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
          pnpm exec tauri signer sign /tmp/desktop-secret-validation.txt
          test -f /tmp/desktop-secret-validation.txt.sig

      - name: Verify updater keypair matches
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          from pathlib import Path

          sig_path = Path('/tmp/desktop-secret-validation.txt.sig')
          minisig_path = Path('/tmp/desktop-secret-validation.txt.minisig')
          minisig_path.write_text(base64.b64decode(sig_path.read_text().strip()).decode('utf-8'))
          PY
          minisign -V \
            -m /tmp/desktop-secret-validation.txt \
            -x /tmp/desktop-secret-validation.txt.minisig \
            -p /tmp/tauri-updater-public-key.pub

      - name: Summarize validation
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Desktop Secret Validation
          - TAURI_UPDATER_PUBLIC_KEY format: ok
          - TAURI_SIGNING_PRIVATE_KEY format: ok
          - TAURI_SIGNING_PRIVATE_KEY_PASSWORD/signing flow: ok
          - Public/private updater keypair match: ok
          EOF
