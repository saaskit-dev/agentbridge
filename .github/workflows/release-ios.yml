name: Release iOS

on:
  workflow_dispatch:
    inputs:
      lane:
        description: Release lane
        required: true
        default: beta
        type: choice
        options:
          - beta
          - production
      distribute_external:
        description: Distribute to external TestFlight group after upload
        required: true
        default: true
        type: boolean

concurrency:
  group: release-ios
  cancel-in-progress: false

jobs:
  quality_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check dependency architecture
        run: pnpm run check:deps

      - name: Typecheck (core + CLI)
        run: pnpm typecheck

  release:
    needs: quality_gate
    runs-on: ${{ fromJSON(vars.IOS_RUNNER_LABELS_JSON || '["self-hosted","macOS","ARM64","ios-build"]') }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Select Xcode
        env:
          XCODE_APP_PATH: ${{ vars.XCODE_APP_PATH }}
        run: |
          set -euo pipefail
          if [ -n "${XCODE_APP_PATH:-}" ]; then
            sudo xcode-select -s "$XCODE_APP_PATH"
          fi
          xcodebuild -version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare CI signing keychain
        env:
          IOS_DIST_P12_BASE64: ${{ secrets.IOS_DIST_P12_BASE64 }}
          IOS_DIST_P12_PASSWORD: ${{ secrets.IOS_DIST_P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-signing.keychain-db"
          P12_PATH="$RUNNER_TEMP/ios-dist-cert.p12"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24 | tr -d '\n')"

          printf '%s' "$IOS_DIST_P12_BASE64" | base64 --decode > "$P12_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "$IOS_DIST_P12_PASSWORD" -f pkcs12 -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          echo "IOS_SIGNING_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "IOS_ORIGINAL_KEYCHAIN_PATH=/Users/dev/Library/Keychains/login.keychain-db" >> "$GITHUB_ENV"

      - name: Release iOS from self-hosted runner
        env:
          APP_ENV: production
          RELEASE_LANE: ${{ inputs.lane }}
          DISTRIBUTE_EXTERNAL: ${{ inputs.distribute_external }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          GOOGLE_SERVICES_PLIST: ${{ secrets.GOOGLE_SERVICES_PLIST }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          IOS_SIGNING_KEYCHAIN_PATH: ${{ env.IOS_SIGNING_KEYCHAIN_PATH }}
          TESTFLIGHT_GROUP: ${{ vars.TESTFLIGHT_GROUP }}
        run: ./scripts/free-app-ios-release.sh

      - name: Restore user keychain
        if: always()
        env:
          IOS_SIGNING_KEYCHAIN_PATH: ${{ env.IOS_SIGNING_KEYCHAIN_PATH }}
          IOS_ORIGINAL_KEYCHAIN_PATH: ${{ env.IOS_ORIGINAL_KEYCHAIN_PATH }}
        run: |
          set -euo pipefail
          if [ -n "${IOS_ORIGINAL_KEYCHAIN_PATH:-}" ] && [ -f "$IOS_ORIGINAL_KEYCHAIN_PATH" ]; then
            security list-keychains -d user -s "$IOS_ORIGINAL_KEYCHAIN_PATH"
            security default-keychain -d user -s "$IOS_ORIGINAL_KEYCHAIN_PATH"
          fi
          if [ -n "${IOS_SIGNING_KEYCHAIN_PATH:-}" ] && [ -f "$IOS_SIGNING_KEYCHAIN_PATH" ]; then
            security delete-keychain "$IOS_SIGNING_KEYCHAIN_PATH" || true
          fi
