name: Release iOS (App Store)

on:
  workflow_run:
    workflows: ["Lint & Dependency Guard"]
    types: [completed]
    branches: [main]

jobs:
  quality_gate:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.changes.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Detect relevant changes
        id: changes
        run: |
          set -e
          SHOULD_RELEASE=true
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            SHOULD_RELEASE=false
            while IFS= read -r file; do
              case "$file" in
                apps/free/app/*|packages/core/*)
                  SHOULD_RELEASE=true
                  break
                  ;;
              esac
            done < <(git diff --name-only HEAD^..HEAD)
          fi
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.should_release == 'true'
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.should_release == 'true'

      - name: Install dependencies
        if: steps.changes.outputs.should_release == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.changes.outputs.should_release == 'true'
        run: pnpm lint

      - name: Check dependency architecture
        if: steps.changes.outputs.should_release == 'true'
        run: pnpm run check:deps

      - name: Typecheck (core + CLI)
        if: steps.changes.outputs.should_release == 'true'
        run: pnpm typecheck

  release:
    needs: quality_gate
    if: needs.quality_gate.result == 'success' && needs.quality_gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build iOS beta → TestFlight
        working-directory: apps/free/app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest build \
            --profile beta \
            --platform ios \
            --auto-submit-with-profile=production \
            --no-wait \
            --non-interactive
