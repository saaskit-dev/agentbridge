name: Release iOS (App Store)

on:
  workflow_dispatch:

jobs:
  quality_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check dependency architecture
        run: pnpm run check:deps

      - name: Typecheck (core + CLI)
        run: pnpm typecheck

  release:
    needs: quality_gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build iOS beta → TestFlight
        working-directory: apps/free/app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest build \
            --profile beta \
            --platform ios \
            --auto-submit-with-profile=production \
            --no-wait \
            --non-interactive
