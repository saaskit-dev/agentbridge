name: Release OTA

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - android
      channel:
        description: OTA channel
        required: true
        default: production
        type: choice
        options:
          - production
          - beta
      message:
        description: Release message
        required: false
        default: ""
        type: string

concurrency:
  group: release-ota-${{ inputs.channel }}-${{ inputs.platform }}
  cancel-in-progress: false

jobs:
  quality_gate:
    runs-on: ${{ fromJSON(vars.MACOS_RUNNER_LABELS_JSON || vars.IOS_RUNNER_LABELS_JSON || '["self-hosted","macOS","ARM64","local-mac"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/quality-gate

  release:
    needs: quality_gate
    runs-on: ${{ fromJSON(vars.MACOS_RUNNER_LABELS_JSON || vars.IOS_RUNNER_LABELS_JSON || '["self-hosted","macOS","ARM64","local-mac"]') }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Materialize Firebase config files
        env:
          GOOGLE_SERVICES_PLIST_RAW: ${{ secrets.GOOGLE_SERVICES_PLIST }}
          GOOGLE_SERVICES_JSON_RAW: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          if [ -n "${GOOGLE_SERVICES_PLIST_RAW:-}" ]; then
            IOS_GOOGLE_SERVICES_PATH="$RUNNER_TEMP/GoogleService-Info.plist"
            printf '%s\n' "$GOOGLE_SERVICES_PLIST_RAW" > "$IOS_GOOGLE_SERVICES_PATH"
            chmod 600 "$IOS_GOOGLE_SERVICES_PATH"
            echo "GOOGLE_SERVICES_PLIST=$IOS_GOOGLE_SERVICES_PATH" >> "$GITHUB_ENV"
          fi
          if [ -n "${GOOGLE_SERVICES_JSON_RAW:-}" ]; then
            ANDROID_GOOGLE_SERVICES_PATH="$RUNNER_TEMP/google-services.json"
            printf '%s\n' "$GOOGLE_SERVICES_JSON_RAW" > "$ANDROID_GOOGLE_SERVICES_PATH"
            chmod 600 "$ANDROID_GOOGLE_SERVICES_PATH"
            echo "GOOGLE_SERVICES_JSON=$ANDROID_GOOGLE_SERVICES_PATH" >> "$GITHUB_ENV"
          fi

      - name: Publish OTA to self-hosted server
        working-directory: apps/free/app
        env:
          APP_ENV: production
          OTA_PLATFORM: ${{ inputs.platform }}
          OTA_CHANNEL: ${{ inputs.channel }}
          OTA_MESSAGE: ${{ inputs.message }}
          OTA_SERVER_URL: ${{ secrets.OTA_SERVER_URL }}
          OTA_SERVER_TOKEN: ${{ secrets.OTA_SERVER_TOKEN }}
          OTA_GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run ota
