name: Release Desktop

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: '["self-hosted","macOS","ARM64","desktop-build"]'
            platform-name: macos-arm64-self-hosted
            bundle-args: ""
          - runner: '["ubuntu-24.04"]'
            platform-name: ubuntu-24.04
            bundle-args: "--bundles appimage,deb"

    runs-on: ${{ fromJSON(matrix.runner) }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform-name == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/free/app/src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare updater config
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          DESKTOP_UPDATER_REPOSITORY: ${{ github.repository }}
        run: node ./scripts/prepare-desktop-updater-config.js --require-key

      - name: Materialize updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY_RAW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/tauri-updater.key"
          printf '%s\n' "$TAURI_SIGNING_PRIVATE_KEY_RAW" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/free/app
          tagName: ${{ github.ref_name }}
          releaseName: Desktop ${{ github.ref_name }}
          releaseBody: |
            Desktop release for Free.

            - Includes updater-enabled bundles
            - `latest.json` is attached for in-app auto-update
          releaseDraft: false
          prerelease: false
          args: --config src-tauri/tauri.updater.conf.json ${{ matrix.bundle-args }}
