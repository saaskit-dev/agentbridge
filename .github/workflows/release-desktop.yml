name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump strategy
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - version
      version:
        description: Explicit version when bump_type=version
        required: false
        type: string
      include_linux:
        description: Also build Linux desktop artifacts
        required: true
        default: false
        type: boolean

jobs:
  prepare_release:
    name: Prepare Desktop Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      tag_name: ${{ steps.prepare.outputs.tag_name }}
      release_sha: ${{ steps.prepare.outputs.release_sha }}
      release_id: ${{ steps.prepare.outputs.release_id }}
      release_url: ${{ steps.prepare.outputs.release_url }}
      include_linux: ${{ steps.prepare.outputs.include_linux }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version and create tag
        id: prepare
        env:
          INPUT_BUMP_TYPE: ${{ inputs.bump_type }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_INCLUDE_LINUX: ${{ inputs.include_linux }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "$INPUT_BUMP_TYPE" = "version" ]; then
            if [ -z "${INPUT_VERSION:-}" ]; then
              echo "version input is required when bump_type=version" >&2
              exit 1
            fi
            node ./scripts/version.js "$INPUT_VERSION"
          else
            node ./scripts/version.js "$INPUT_BUMP_TYPE"
          fi

          VERSION="$(node -p "require('./apps/free/app/src-tauri/tauri.conf.json').version")"
          TAG_NAME="desktop-v${VERSION}"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG_NAME" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/free/app/package.json apps/free/app/src-tauri/tauri.conf.json
          git commit -m "Release desktop ${VERSION}"
          git tag "$TAG_NAME"
          git push origin HEAD:main
          git push origin "$TAG_NAME"

          RELEASE_SHA="$(git rev-parse HEAD)"
          RELEASE_BODY="$(mktemp)"
          cat > "$RELEASE_BODY" <<EOF
          Desktop release for Free.

          - Includes updater-enabled bundles
          - \`latest.json\` is attached for in-app auto-update
          EOF
          gh release create "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --title "Desktop $TAG_NAME" \
            --notes-file "$RELEASE_BODY" \
            --target "$RELEASE_SHA" \
            --verify-tag
          RELEASE_ID="$(gh release view "$TAG_NAME" --repo "${{ github.repository }}" --json databaseId --jq '.databaseId')"
          RELEASE_URL="$(gh release view "$TAG_NAME" --repo "${{ github.repository }}" --json url --jq '.url')"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          echo "include_linux=$INPUT_INCLUDE_LINUX" >> "$GITHUB_OUTPUT"

      - name: Summarize prepared release
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Desktop Release Prepared
          - Version: ${{ steps.prepare.outputs.version }}
          - Tag: \`${{ steps.prepare.outputs.tag_name }}\`
          - Release: ${{ steps.prepare.outputs.release_url }}
          - Linux enabled: \`${{ steps.prepare.outputs.include_linux }}\`
          EOF

  release:
    needs: prepare_release
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: '["self-hosted","macOS","ARM64","desktop-build"]'
            platform-name: macos-arm64-self-hosted
            bundle-args: "--bundles app"
          - runner: '["ubuntu-24.04"]'
            platform-name: ubuntu-24.04
            bundle-args: "--bundles appimage,deb"

    runs-on: ${{ fromJSON(matrix.runner) }}

    steps:
      - uses: actions/checkout@v4
        if: ${{ matrix.platform-name != 'ubuntu-24.04' || needs.prepare_release.outputs.include_linux == 'true' }}
        with:
          ref: refs/tags/${{ needs.prepare_release.outputs.tag_name }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        if: ${{ matrix.platform-name != 'ubuntu-24.04' || needs.prepare_release.outputs.include_linux == 'true' }}

      - uses: actions/setup-node@v4
        if: ${{ matrix.platform-name != 'ubuntu-24.04' || needs.prepare_release.outputs.include_linux == 'true' }}
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        if: ${{ matrix.platform-name != 'ubuntu-24.04' || needs.prepare_release.outputs.include_linux == 'true' }}
        run: bash ./scripts/setup-rust-ci.sh

      - name: Install Linux system dependencies
        if: ${{ matrix.platform-name == 'ubuntu-24.04' && needs.prepare_release.outputs.include_linux == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust cache
        if: ${{ matrix.platform-name != 'ubuntu-24.04' || needs.prepare_release.outputs.include_linux == 'true' }}
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/free/app/src-tauri -> target'

      - name: Install dependencies
        if: ${{ matrix.platform-name != 'ubuntu-24.04' || needs.prepare_release.outputs.include_linux == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Prepare updater config
        if: ${{ matrix.platform-name != 'ubuntu-24.04' || needs.prepare_release.outputs.include_linux == 'true' }}
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          DESKTOP_UPDATER_REPOSITORY: ${{ github.repository }}
        run: node ./scripts/prepare-desktop-updater-config.js --require-key

      - name: Materialize updater signing key
        if: ${{ matrix.platform-name != 'ubuntu-24.04' || needs.prepare_release.outputs.include_linux == 'true' }}
        env:
          TAURI_SIGNING_PRIVATE_KEY_RAW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node ./scripts/prepare-tauri-signing-key.js

      - uses: tauri-apps/tauri-action@v0
        if: ${{ matrix.platform-name != 'ubuntu-24.04' || needs.prepare_release.outputs.include_linux == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/free/app
          releaseId: ${{ needs.prepare_release.outputs.release_id }}
          tagName: ${{ needs.prepare_release.outputs.tag_name }}
          releaseName: Desktop ${{ needs.prepare_release.outputs.tag_name }}
          releaseBody: |
            Desktop release for Free.

            - Includes updater-enabled bundles
            - `latest.json` is attached for in-app auto-update
          releaseDraft: false
          prerelease: false
          args: --config src-tauri/tauri.updater.conf.json ${{ matrix.bundle-args }}

      - name: Verify release target
        if: ${{ matrix.platform-name != 'ubuntu-24.04' || needs.prepare_release.outputs.include_linux == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "${{ needs.prepare_release.outputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --json tagName,url \
            --jq '"tag=\(.tagName) url=\(.url)"'

      - name: Create macOS DMG
        if: ${{ matrix.platform-name == 'macos-arm64-self-hosted' }}
        working-directory: apps/free/app
        run: |
          VERSION="${{ needs.prepare_release.outputs.version }}"
          bash ../../../scripts/repair-tauri-macos-app-signature.sh "src-tauri/target/release/bundle/macos"
          codesign --verify --deep --strict "src-tauri/target/release/bundle/macos/Free.app"
          spctl --assess --type execute --verbose=4 "src-tauri/target/release/bundle/macos/Free.app" || true
          DMG_PATH="src-tauri/target/release/bundle/dmg/Free_${VERSION}_aarch64.dmg"
          mkdir -p "$(dirname "$DMG_PATH")"
          bash ../../../scripts/create-macos-dmg.sh \
            "src-tauri/target/release/bundle/macos/Free.app" \
            "$DMG_PATH"

      - name: Upload macOS DMG
        if: ${{ matrix.platform-name == 'macos-arm64-self-hosted' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: apps/free/app
        run: |
          VERSION="${{ needs.prepare_release.outputs.version }}"
          gh release upload "${{ needs.prepare_release.outputs.tag_name }}" \
            "src-tauri/target/release/bundle/dmg/Free_${VERSION}_aarch64.dmg" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Summarize published release
        if: ${{ matrix.platform-name == 'macos-arm64-self-hosted' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET_NAMES="$(gh release view "${{ needs.prepare_release.outputs.tag_name }}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' | paste -sd ', ' -)"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Desktop Release Published
          - Version: ${{ needs.prepare_release.outputs.version }}
          - Tag: \`${{ needs.prepare_release.outputs.tag_name }}\`
          - Release: ${{ needs.prepare_release.outputs.release_url }}
          - Assets: ${ASSET_NAMES:-none}
          EOF
