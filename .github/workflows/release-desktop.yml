name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump strategy
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - version
      version:
        description: Explicit version when bump_type=version
        required: false
        type: string
      include_linux:
        description: Also build Linux desktop artifacts
        required: true
        default: false
        type: boolean

concurrency:
  group: release-desktop
  cancel-in-progress: false

jobs:
  quality_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/quality-gate

  prepare_release:
    needs: quality_gate
    name: Prepare Desktop Release
    runs-on: ${{ fromJSON(vars.MACOS_RUNNER_LABELS_JSON || vars.IOS_RUNNER_LABELS_JSON || '["self-hosted","macOS","ARM64","local-mac"]') }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      tag_name: ${{ steps.prepare.outputs.tag_name }}
      release_sha: ${{ steps.prepare.outputs.release_sha }}
      release_id: ${{ steps.prepare.outputs.release_id }}
      release_url: ${{ steps.prepare.outputs.release_url }}
      include_linux: ${{ steps.prepare.outputs.include_linux }}
      release_matrix: ${{ steps.prepare.outputs.release_matrix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate updater signing secrets
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_RAW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          node <<'EOF'
          const publicKey = (process.env.TAURI_UPDATER_PUBLIC_KEY || '').trim();
          const privateKey = (process.env.TAURI_SIGNING_PRIVATE_KEY_RAW || '').trim();
          const password = (process.env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '').trim();

          function decodeIfBase64(value) {
            try {
              const decoded = Buffer.from(value, 'base64').toString('utf8');
              if (decoded.includes('untrusted comment:')) {
                return decoded;
              }
            } catch {}
            return value;
          }

          const normalizedPublicKey = decodeIfBase64(publicKey);
          const normalizedPrivateKey = decodeIfBase64(privateKey);

          if (!normalizedPublicKey || !normalizedPublicKey.includes('untrusted comment:') || !/public key/i.test(normalizedPublicKey)) {
            throw new Error('TAURI_UPDATER_PUBLIC_KEY is missing or invalid');
          }

          if (!normalizedPrivateKey || !normalizedPrivateKey.includes('untrusted comment:') || !/secret key/i.test(normalizedPrivateKey)) {
            throw new Error('TAURI_SIGNING_PRIVATE_KEY is missing or invalid');
          }

          if (!password) {
            throw new Error('TAURI_SIGNING_PRIVATE_KEY_PASSWORD is missing');
          }
          EOF

      - name: Bump version and create tag
        id: prepare
        env:
          INPUT_BUMP_TYPE: ${{ inputs.bump_type }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_INCLUDE_LINUX: ${{ inputs.include_linux }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "$INPUT_BUMP_TYPE" = "version" ]; then
            if [ -z "${INPUT_VERSION:-}" ]; then
              echo "version input is required when bump_type=version" >&2
              exit 1
            fi
            node ./scripts/version.js "$INPUT_VERSION"
          else
            node ./scripts/version.js "$INPUT_BUMP_TYPE"
          fi

          VERSION="$(node -p "require('./apps/free/app/src-tauri/tauri.conf.json').version")"
          TAG_NAME="desktop-v${VERSION}"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG_NAME" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/free/app/package.json apps/free/app/src-tauri/tauri.conf.json
          git commit -m "Release desktop ${VERSION}"
          git tag "$TAG_NAME"
          git push origin HEAD:refs/heads/main
          git push origin "$TAG_NAME"

          RELEASE_SHA="$(git rev-parse HEAD)"
          RELEASE_BODY="$(mktemp)"
          cat > "$RELEASE_BODY" <<EOF
          Desktop release for Free.

          - Includes updater-enabled bundles
          - \`latest.json\` is attached for in-app auto-update
          EOF
          gh release create "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --title "Desktop $TAG_NAME" \
            --notes-file "$RELEASE_BODY" \
            --target "$RELEASE_SHA" \
            --verify-tag
          RELEASE_ID="$(gh release view "$TAG_NAME" --repo "${{ github.repository }}" --json databaseId --jq '.databaseId')"
          RELEASE_URL="$(gh release view "$TAG_NAME" --repo "${{ github.repository }}" --json url --jq '.url')"

          if [ "$INPUT_INCLUDE_LINUX" = "true" ]; then
            RELEASE_MATRIX='{"include":[{"runner":"[\"self-hosted\",\"macOS\",\"ARM64\",\"desktop-build\"]","platform-name":"macos-arm64-self-hosted","bundle-args":"--bundles app"},{"runner":"[\"ubuntu-24.04\"]","platform-name":"ubuntu-24.04","bundle-args":"--bundles appimage,deb"}]}'
          else
            RELEASE_MATRIX='{"include":[{"runner":"[\"self-hosted\",\"macOS\",\"ARM64\",\"desktop-build\"]","platform-name":"macos-arm64-self-hosted","bundle-args":"--bundles app"}]}'
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          echo "include_linux=$INPUT_INCLUDE_LINUX" >> "$GITHUB_OUTPUT"
          echo "release_matrix=$RELEASE_MATRIX" >> "$GITHUB_OUTPUT"

      - name: Summarize prepared release
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Desktop Release Prepared
          - Version: ${{ steps.prepare.outputs.version }}
          - Tag: \`${{ steps.prepare.outputs.tag_name }}\`
          - Release: ${{ steps.prepare.outputs.release_url }}
          - Linux enabled: \`${{ steps.prepare.outputs.include_linux }}\`
          EOF

  release:
    needs: prepare_release
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare_release.outputs.release_matrix) }}

    runs-on: ${{ fromJSON(matrix.runner) }}
    if: ${{ needs.prepare_release.result == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare_release.outputs.tag_name }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        run: bash ./scripts/setup-rust-ci.sh

      - name: Install Linux system dependencies
        if: ${{ matrix.platform-name == 'ubuntu-24.04' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/free/app/src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare updater config
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          DESKTOP_UPDATER_BASE_URL: ${{ secrets.OTA_SERVER_URL }}
          DESKTOP_UPDATER_CHANNEL: stable
        run: node ./scripts/prepare-desktop-updater-config.js --require-key

      - name: Materialize updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY_RAW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node ./scripts/prepare-tauri-signing-key.js

      - name: Verify updater signing flow
        if: ${{ matrix.platform-name == 'macos-arm64-self-hosted' }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEY_FILE="$RUNNER_TEMP/tauri-signing-key.txt"
          TEST_FILE="$RUNNER_TEMP/desktop-secret-validation.txt"
          printf '%s\n' "$TAURI_SIGNING_PRIVATE_KEY" > "$KEY_FILE"
          printf 'desktop secret validation\n' > "$TEST_FILE"
          pnpm --dir apps/free/app exec tauri signer sign \
            -f "$KEY_FILE" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$TEST_FILE"
          test -f "${TEST_FILE}.sig"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/free/app
          releaseId: ${{ needs.prepare_release.outputs.release_id }}
          tagName: ${{ needs.prepare_release.outputs.tag_name }}
          releaseName: Desktop ${{ needs.prepare_release.outputs.tag_name }}
          releaseBody: |
            Desktop release for Free.

            - Includes updater-enabled bundles
            - `latest.json` is attached for in-app auto-update
          releaseDraft: false
          prerelease: false
          args: --config src-tauri/tauri.updater.conf.json ${{ matrix.bundle-args }}

      - name: Verify release target
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "${{ needs.prepare_release.outputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --json tagName,url \
            --jq '"tag=\(.tagName) url=\(.url)"'

      - name: Verify updater assets
        if: ${{ matrix.platform-name == 'macos-arm64-self-hosted' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ASSETS="$(gh release view "${{ needs.prepare_release.outputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --json assets \
            --jq '.assets[].name')"
          echo "$ASSETS"
          if ! echo "$ASSETS" | grep -qx 'latest.json'; then
            echo "Release is missing latest.json updater manifest" >&2
            exit 1
          fi

      - name: Create macOS DMG
        if: ${{ matrix.platform-name == 'macos-arm64-self-hosted' }}
        working-directory: apps/free/app
        run: |
          VERSION="${{ needs.prepare_release.outputs.version }}"
          bash ../../../scripts/repair-tauri-macos-app-signature.sh "src-tauri/target/release/bundle/macos"
          codesign --verify --deep --strict "src-tauri/target/release/bundle/macos/Free.app"
          spctl --assess --type execute --verbose=4 "src-tauri/target/release/bundle/macos/Free.app" || true
          DMG_PATH="src-tauri/target/release/bundle/dmg/Free_${VERSION}_aarch64.dmg"
          mkdir -p "$(dirname "$DMG_PATH")"
          bash ../../../scripts/create-macos-dmg.sh \
            "src-tauri/target/release/bundle/macos/Free.app" \
            "$DMG_PATH"

      - name: Upload macOS DMG
        if: ${{ matrix.platform-name == 'macos-arm64-self-hosted' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: apps/free/app
        run: |
          VERSION="${{ needs.prepare_release.outputs.version }}"
          gh release upload "${{ needs.prepare_release.outputs.tag_name }}" \
            "src-tauri/target/release/bundle/dmg/Free_${VERSION}_aarch64.dmg" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Publish desktop updater pointer
        if: ${{ matrix.platform-name == 'macos-arm64-self-hosted' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DESKTOP_UPDATER_SERVER_URL: ${{ secrets.OTA_SERVER_URL }}
          DESKTOP_UPDATER_SERVER_TOKEN: ${{ secrets.OTA_SERVER_TOKEN }}
          DESKTOP_UPDATER_CHANNEL: stable
          DESKTOP_RELEASE_TAG_NAME: ${{ needs.prepare_release.outputs.tag_name }}
          DESKTOP_RELEASE_VERSION: ${{ needs.prepare_release.outputs.version }}
          DESKTOP_RELEASE_URL: ${{ needs.prepare_release.outputs.release_url }}
          DESKTOP_RELEASE_SHA: ${{ needs.prepare_release.outputs.release_sha }}
        run: node ./scripts/publish-desktop-release-pointer.js

      - name: Summarize published release
        if: ${{ matrix.platform-name == 'macos-arm64-self-hosted' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET_NAMES="$(gh release view "${{ needs.prepare_release.outputs.tag_name }}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' | paste -sd ', ' -)"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Desktop Release Published
          - Version: ${{ needs.prepare_release.outputs.version }}
          - Tag: \`${{ needs.prepare_release.outputs.tag_name }}\`
          - Release: ${{ needs.prepare_release.outputs.release_url }}
          - Assets: ${ASSET_NAMES:-none}
          EOF
